# Skill source registry for the canonical shared library.
# Each entry maps an installed shared skill to its upstream source and local modification status.
# modified: true means there are intentional local changes that must survive any upstream update.
# source: null means no public upstream (custom/local-only origin).
# Some public upstream paths are metadata-only until the corresponding source repo is cloned locally.

base_paths:
  anthropic:    /home/wangzixiong/.claude/skill-sources/anthropic/skills
  openai:       /home/wangzixiong/.claude/skill-sources/openai/skills/.system
  k_dense:      /home/wangzixiong/.claude/skill-sources/community/claude-scientific-skills/scientific-skills
  scicraft_sci: /home/wangzixiong/.claude/skill-sources/community/scicraft/skills/scientific-writing
  scicraft_bio: /home/wangzixiong/.claude/skill-sources/community/scicraft/skills/genomics-bioinformatics
  scicraft_sta: /home/wangzixiong/.claude/skill-sources/community/scicraft/skills/biostatistics
  scicraft_cmp: /home/wangzixiong/.claude/skill-sources/community/scicraft/skills/scientific-computing
  obsidian:     /home/wangzixiong/.claude/skill-sources/community/obsidian-skills/skills
  evil_read:    /home/wangzixiong/.claude/skill-sources/community/evil-read-arxiv
  coworker:     /home/wangzixiong/.claude/skill-sources/coworker
